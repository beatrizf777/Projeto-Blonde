<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gerenciar Álbuns | blonde.com</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Special+Elite&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/css/styles.css"/>
</head>
<body>
  <div class="browser-chrome">
    <header class="browser-header">
      <nav class="browser-nav">
        <div class="nav-dots">
          <span class="dot dot--red"></span>
          <span class="dot dot--yellow"></span>
          <span class="dot dot--green"></span>
        </div>
        <div class="address-bar">blonde.com / admin</div>
        <a href="index.html" class="search-icon text-decoration-none" style="font-size:13px; font-weight:700; font-family:var(--font-mono);">↩</a>
      </nav>
    </header>

    <main class="page-main" id="main-conteudo">
      <!-- conteúdo injetado via JS, conforme permissão -->
    </main>

    <footer class="site-footer">
      <nav class="footer-nav">
        <a href="index.html" class="footer-link">← voltar para home</a>
      </nav>
      <p class="footer-copy">blonde.com · fan page oficial · 2025</p>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/scripts/login.js"></script>
  <script>
    const API = 'http://localhost:3000/albuns';
    let editandoId = null;

    function checarAcesso() {
      const main = document.getElementById('main-conteudo');
      if (!isAdmin()) {
        main.innerHTML = `
          <section class="form-section text-center">
            <h2 class="form-title">Acesso restrito</h2>
            <p class="font-monospace">Apenas administradores podem gerenciar álbuns.</p>
          </section>
        `;
        return false;
      }
      montarTela();
      return true;
    }

    function montarTela() {
      const main = document.getElementById('main-conteudo');
      main.innerHTML = `
        <section class="form-section">
          <h2 class="form-title" id="form-titulo">Cadastrar Novo Álbum</h2>
          <div id="msg-feedback" style="display:none; font-family:'Courier Prime',monospace; font-size:13px; margin-bottom:12px; padding:8px 12px; border-radius:6px;"></div>

          <div class="row g-3">
            <div class="col-12 col-md-6">
              <div class="form-group">
                <label class="form-label">Nome</label>
                <input type="text" id="inp-nome" class="form-input"/>
              </div>
            </div>
            <div class="col-12 col-md-6">
              <div class="form-group">
                <label class="form-label">Categoria</label>
                <select id="inp-categoria" class="form-input">
                  <option value="">Selecione...</option>
                  <option>Álbum de Estúdio</option>
                  <option>Mixtape</option>
                  <option>Single</option>
                  <option>Álbum Visual</option>
                </select>
              </div>
            </div>
            <div class="col-12">
              <div class="form-group">
                <label class="form-label">Descrição Curta</label>
                <input type="text" id="inp-desc-curta" class="form-input"/>
              </div>
            </div>
            <div class="col-12">
              <div class="form-group">
                <label class="form-label">Descrição Completa</label>
                <textarea id="inp-desc-completa" class="form-input" rows="4"></textarea>
              </div>
            </div>
            <div class="col-12 col-md-6">
              <div class="form-group">
                <label class="form-label">URL da Imagem</label>
                <input type="text" id="inp-imagem" class="form-input"/>
              </div>
            </div>
            <div class="col-12 col-md-3">
              <div class="form-group">
                <label class="form-label">Lançamento</label>
                <input type="date" id="inp-lancamento" class="form-input"/>
              </div>
            </div>
            <div class="col-12 col-md-3">
              <div class="form-group">
                <label class="form-label">Duração</label>
                <input type="text" id="inp-duracao" class="form-input" placeholder="Ex: 55:41"/>
              </div>
            </div>
            <div class="col-12">
              <div class="form-group">
                <label class="form-label">Tags (separadas por vírgula)</label>
                <input type="text" id="inp-tags" class="form-input" placeholder="r&b, 2012, grammy"/>
              </div>
            </div>
            <div class="col-12">
              <div class="form-group" style="flex-direction:row; align-items:center; gap:10px;">
                <input type="checkbox" id="inp-destaque" style="width:16px; height:16px;"/>
                <label for="inp-destaque" class="form-label" style="margin:0;">Marcar como destaque (aparece no carrossel)</label>
              </div>
            </div>
          </div>

          <button class="form-btn mt-4" id="btn-salvar" onclick="salvarAlbum()">Cadastrar →</button>
          <button class="form-btn mt-4 d-none" id="btn-cancelar" style="background:#999; border-color:#999;" onclick="cancelarEdicao()">Cancelar edição</button>
        </section>

        <section class="albums-section mt-4">
          <h3 class="galeria-titulo">Álbuns Cadastrados</h3>
          <div class="table-responsive">
            <table class="table table-hover align-middle" style="background:var(--bg-inner);">
              <thead>
                <tr><th>Nome</th><th>Categoria</th><th>Ano</th><th class="text-end">Ações</th></tr>
              </thead>
              <tbody id="tabela-albuns"></tbody>
            </table>
          </div>
        </section>
      `;
      carregarTabela();
    }

    async function carregarTabela() {
      const res = await fetch(API);
      const albuns = await res.json();
      const tbody = document.getElementById('tabela-albuns');
      tbody.innerHTML = '';

      albuns.forEach(album => {
        tbody.innerHTML += `
          <tr>
            <td><strong>${album.nome}</strong></td>
            <td>${album.categoria}</td>
            <td>${album.lancamento ? album.lancamento.slice(0,4) : '-'}</td>
            <td class="text-end">
              <button class="btn btn-sm btn-outline-secondary me-1" onclick="prepararEdicao('${album.id}')">Editar</button>
              <button class="btn btn-sm btn-outline-danger" onclick="excluirAlbum('${album.id}')">Excluir</button>
            </td>
          </tr>
        `;
      });
    }

    async function prepararEdicao(id) {
      const res = await fetch(`${API}/${id}`);
      const album = await res.json();

      document.getElementById('inp-nome').value = album.nome || '';
      document.getElementById('inp-categoria').value = album.categoria || '';
      document.getElementById('inp-desc-curta').value = album.descricaoCurta || '';
      document.getElementById('inp-desc-completa').value = album.descricaoCompleta || '';
      document.getElementById('inp-imagem').value = album.imagem || '';
      document.getElementById('inp-lancamento').value = album.lancamento || '';
      document.getElementById('inp-duracao').value = album.duracao || '';
      document.getElementById('inp-tags').value = (album.tags || []).join(', ');
      document.getElementById('inp-destaque').checked = !!album.destaque;

      editandoId = id;
      document.getElementById('form-titulo').textContent = `Editando: ${album.nome}`;
      document.getElementById('btn-salvar').textContent = 'Salvar alterações →';
      document.getElementById('btn-cancelar').classList.remove('d-none');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function cancelarEdicao() {
      editandoId = null;
      document.querySelectorAll('.form-input').forEach(el => el.value = '');
      document.getElementById('inp-destaque').checked = false;
      document.getElementById('form-titulo').textContent = 'Cadastrar Novo Álbum';
      document.getElementById('btn-salvar').textContent = 'Cadastrar →';
      document.getElementById('btn-cancelar').classList.add('d-none');
    }

    async function salvarAlbum() {
      const nome = document.getElementById('inp-nome').value.trim();
      const categoria = document.getElementById('inp-categoria').value;
      const descricaoCurta = document.getElementById('inp-desc-curta').value.trim();
      const descricaoCompleta = document.getElementById('inp-desc-completa').value.trim();
      const imagem = document.getElementById('inp-imagem').value.trim();
      const lancamento = document.getElementById('inp-lancamento').value;
      const duracao = document.getElementById('inp-duracao').value.trim();
      const tagsRaw = document.getElementById('inp-tags').value;
      const destaque = document.getElementById('inp-destaque').checked;

      if (!nome || !categoria || !descricaoCurta) {
        mostrarMsg('Preencha pelo menos nome, categoria e descrição curta.', 'erro');
        return;
      }

      const tags = tagsRaw.split(',').map(t => t.trim()).filter(Boolean);
      const dadosAlbum = { nome, categoria, descricaoCurta, descricaoCompleta, imagem, lancamento, duracao, tags, destaque };

      try {
        let res;
        if (editandoId) {
          res = await fetch(`${API}/${editandoId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: editandoId, ...dadosAlbum })
          });
        } else {
          res = await fetch(API, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(dadosAlbum)
          });
        }

        if (res.ok) {
          mostrarMsg(editandoId ? '✓ Álbum atualizado!' : '✓ Álbum cadastrado!', 'ok');
          cancelarEdicao();
          carregarTabela();
        } else {
          mostrarMsg('Erro ao salvar. Tente novamente.', 'erro');
        }
      } catch (err) {
        console.error('Erro ao salvar álbum:', err);
        mostrarMsg('Não foi possível conectar ao servidor.', 'erro');
      }
    }

    async function excluirAlbum(id) {
      if (!confirm('Tem certeza que deseja excluir este álbum?')) return;
      await fetch(`${API}/${id}`, { method: 'DELETE' });
      carregarTabela();
    }

    function mostrarMsg(texto, tipo) {
      const el = document.getElementById('msg-feedback');
      el.textContent = texto;
      el.style.display = 'block';
      el.style.background = tipo === 'ok' ? '#d8f0c8' : '#f7d6d6';
      el.style.color = tipo === 'ok' ? '#1a6200' : '#a00000';
    }

    document.addEventListener('DOMContentLoaded', checarAcesso);
  </script>
</body>
</html>
