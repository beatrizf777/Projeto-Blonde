<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>blonde.com - Detalhes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Special+Elite&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/css/styles.css"/>
</head>
<body>
  <div class="browser-chrome">
    <header class="browser-header">
      <nav class="browser-nav">
        <div class="nav-dots">
          <span class="dot dot--red"></span>
          <span class="dot dot--yellow"></span>
          <span class="dot dot--green"></span>
        </div>
        <div class="address-bar">blonde.com</div>
        <a href="index.html" class="search-icon text-decoration-none" style="font-size:13px; font-weight:700; font-family:var(--font-mono);">↩</a>
      </nav>
    </header>

    <main class="page-main" id="detalhes-main-container">
      <section class="detalhe-section" style="position:relative;">
        <button id="btn-favorito-detalhe" class="d-none" style="background:none; border:none; font-size:28px; cursor:pointer; position:absolute; top:16px; right:16px;">🤍</button>
        <div class="row g-4 align-items-start">
          <div class="col-12 col-md-5 text-center">
            <div class="album-cover-wrap">
              <img id="detalhe-img" src="" alt="" class="album-cover-img" style="aspect-ratio:1/1;"/>
            </div>
          </div>
          <div class="col-12 col-md-7">
            <h1 class="detalhe-titulo" id="detalhe-titulo">Carregando...</h1>
            <p class="detalhe-descricao" id="detalhe-descricao"></p>
            <div class="detalhe-meta">
              <div class="detalhe-meta-item">
                <span class="detalhe-meta-label">🎵 Categoria</span>
                <span class="detalhe-meta-valor" id="detalhe-categoria"></span>
              </div>
              <div class="detalhe-meta-item">
                <span class="detalhe-meta-label">📅 Lançamento</span>
                <span class="detalhe-meta-valor" id="detalhe-lancamento"></span>
              </div>
              <div class="detalhe-meta-item">
                <span class="detalhe-meta-label">⏱️ Duração</span>
                <span class="detalhe-meta-valor" id="detalhe-duracao"></span>
              </div>
            </div>
            <p class="detalhe-conteudo" id="detalhe-conteudo-texto"></p>
            <div id="detalhe-tags" class="mt-3"></div>
          </div>
        </div>
      </section>

      <section class="galeria-section">
        <h3 class="galeria-titulo">Galeria Visual & Material Vinculado</h3>
        <div class="row g-3" id="container-fotos-vinculadas"></div>
      </section>
    </main>

    <footer class="site-footer">
      <nav class="footer-nav">
        <a href="index.html" class="footer-link">← voltar para home</a>
      </nav>
      <p class="footer-copy">blonde.com · fan page oficial · 2025</p>
    </footer>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/scripts/login.js"></script>
  <script src="assets/scripts/favoritos.js"></script>
  <script src="assets/scripts/detalhes.js"></script>
</body>
</html>
