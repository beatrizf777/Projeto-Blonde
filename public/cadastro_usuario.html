<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Criar Conta | blonde.com</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Special+Elite&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="assets/css/styles.css"/>
</head>
<body>
  <div class="browser-chrome">
    <header class="browser-header">
      <nav class="browser-nav">
        <div class="nav-dots">
          <span class="dot dot--red"></span>
          <span class="dot dot--yellow"></span>
          <span class="dot dot--green"></span>
        </div>
        <div class="address-bar">blonde.com / criar conta</div>
        <a href="index.html" class="search-icon text-decoration-none" style="font-size:13px; font-weight:700; font-family:var(--font-mono);">↩</a>
      </nav>
    </header>

    <main class="page-main">
      <section class="form-section" style="max-width:520px; margin:0 auto;">
        <h2 class="form-title">Criar Nova Conta</h2>

        <div id="msg-feedback" style="display:none; font-family:'Courier Prime',monospace; font-size:13px; margin-bottom:14px; padding:8px 12px; border-radius:6px;"></div>

        <form id="form-cadastro-usuario">
          <div class="row g-3">
            <div class="col-12">
              <div class="form-group">
                <label class="form-label">Nome completo</label>
                <input type="text" id="txt_nome" class="form-input" required/>
              </div>
            </div>
            <div class="col-12 col-md-6">
              <div class="form-group">
                <label class="form-label">Usuário (login)</label>
                <input type="text" id="txt_login" class="form-input" required/>
              </div>
            </div>
            <div class="col-12 col-md-6">
              <div class="form-group">
                <label class="form-label">E-mail</label>
                <input type="email" id="txt_email" class="form-input" required/>
              </div>
            </div>
            <div class="col-12 col-md-6">
              <div class="form-group">
                <label class="form-label">Senha</label>
                <input type="password" id="txt_senha" class="form-input" required/>
              </div>
            </div>
            <div class="col-12 col-md-6">
              <div class="form-group">
                <label class="form-label">Confirmar senha</label>
                <input type="password" id="txt_senha2" class="form-input" required/>
              </div>
            </div>
          </div>
          <button type="submit" class="form-btn mt-4">Criar conta →</button>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <nav class="footer-nav">
        <a href="index.html" class="footer-link">← voltar para home</a>
      </nav>
      <p class="footer-copy">blonde.com · fan page oficial · 2025</p>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/scripts/login.js"></script>
  <script>
    document.getElementById('form-cadastro-usuario').addEventListener('submit', async (event) => {
      event.preventDefault();

      const nome   = document.getElementById('txt_nome').value.trim();
      const login  = document.getElementById('txt_login').value.trim();
      const email  = document.getElementById('txt_email').value.trim();
      const senha  = document.getElementById('txt_senha').value;
      const senha2 = document.getElementById('txt_senha2').value;

      if (senha !== senha2) {
        mostrarMsg('As senhas informadas não conferem.', 'erro');
        return;
      }

      const resultado = await addUser(nome, login, senha, email);

      if (resultado && resultado.erro === 'login-existente') {
        mostrarMsg('Esse nome de usuário já está em uso.', 'erro');
        return;
      }
      if (resultado && resultado.erro) {
        mostrarMsg('Não foi possível criar a conta. Tente novamente.', 'erro');
        return;
      }

      mostrarMsg('✓ Conta criada com sucesso! Redirecionando para o login...', 'ok');
      document.getElementById('form-cadastro-usuario').reset();
      setTimeout(() => { window.location.href = 'index.html'; }, 1500);
    });

    function mostrarMsg(texto, tipo) {
      const el = document.getElementById('msg-feedback');
      el.textContent = texto;
      el.style.display = 'block';
      el.style.background = tipo === 'ok' ? '#d8f0c8' : '#f7d6d6';
      el.style.color = tipo === 'ok' ? '#1a6200' : '#a00000';
    }
  </script>
</body>
</html>
